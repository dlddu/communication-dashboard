name: CI

on:
  push:
    branches: [main, "feature/**", "fix/**", "feat/**"]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Swift Tests
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.4.app/Contents/Developer

      - name: Show Swift version
        run: swift --version

      - name: Resolve dependencies
        run: swift package resolve

      - name: Build
        run: swift build

      - name: Run tests
        run: swift test --enable-code-coverage

      - name: Generate coverage report
        run: |
          xcrun llvm-cov export \
            .build/debug/CommBoardPackageTests.xctest/Contents/MacOS/CommBoardPackageTests \
            -instr-profile=.build/debug/codecov/default.profdata \
            -format=lcov \
            > coverage.lcov

      - name: Upload coverage to Codecov
        if: github.event_name == 'push'
        uses: codecov/codecov-action@v4
        with:
          files: coverage.lcov
          fail_ci_if_error: false

  e2e-test:
    name: E2E / Smoke Tests
    runs-on: macos-14
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.4.app/Contents/Developer

      - name: Show Swift version
        run: swift --version

      - name: Resolve dependencies
        run: swift package resolve

      - name: Build CommBoardUITests target
        run: swift build --target CommBoardUITests

      - name: Run E2E / Smoke Tests
        run: swift test --filter CommBoardUITests --enable-code-coverage

      - name: Generate E2E coverage report
        run: |
          xcrun llvm-cov export \
            .build/debug/CommBoardPackageTests.xctest/Contents/MacOS/CommBoardPackageTests \
            -instr-profile=.build/debug/codecov/default.profdata \
            -format=lcov \
            > e2e-coverage.lcov

      - name: Upload E2E coverage to Codecov
        if: github.event_name == 'push'
        uses: codecov/codecov-action@v4
        with:
          files: e2e-coverage.lcov
          flags: e2e
          fail_ci_if_error: false
